
<!DOCTYPE html>

<html>
<head>
<meta charset="utf-8">

<meta property="og:title" content="Virtuálna prehliadka" />
<meta property="og:type" content="website" />
<meta property="og:image" content="https://lacihvi.github.io/Stolna_Barbora/intro.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:description" content="Kliknite a vstúpte do virtuálnej prehliadky" />
<meta property="og:url" content="https://lacihvi.github.io/Stolna_Barbora/" />
<meta name="twitter:card" content="summary_large_image">

<title>Virtuálna prehliadka</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* BACKGROUND */
.bg {
    position: center 20%;
    width: 100%;
    height: 100%;
   background: url('https://lacihvi.github.io/Stolna_Barbora/intro.png') center top / cover no-repeat;
    filter: brightness(0.6);
}

/* OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.8));
}

/* CONTENT */
.content {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    align-items: center;       /* DÔLEŽITÉ */
    justify-content: flex-end; /* dole */
    flex-direction: column;
    text-align: center;
    padding-bottom: 80px;
}

/* TITLE */
h1 {
    font-size: 32px;
    margin-bottom: 20px;
}

/* BUTTON */
.button {
    padding: 15px 30px;
    font-size: 18px;
    border: none;
    border-radius: 30px;
    background: white;
    color: black;
    cursor: pointer;
    transition: 0.3s;
}

.button:hover {
    background: #ddd;
}

/* SMALL TEXT */
.note {
    margin-top: 10px;
    font-size: 12px;
    opacity: 0.7;
}

/* FADE OUT */
.fade-out {
    animation: fadeOut 1s ease forwards;
}

@keyframes fadeOut {
    to { opacity: 0; }
}
</style>

<script>
function enterTour() {
    document.body.classList.add("fade-out");

    setTimeout(function() {
        window.location.href = "https://lacihvi.42web.io/Pano/Barbora/tour.html";
    }, 1000);
}

/* AUTO START after 4 seconds */
setTimeout(enterTour, 4000);
</script>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">
    <button class="button" onclick="enterTour()">Vstúpiť do prehliadky</button>
    <div class="note">automatické otvorenie o pár sekúnd…</div>
</div>

</body>
</html>
