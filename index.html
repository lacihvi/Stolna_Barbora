
<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">

<meta property="og:title" content="Štôlňa Barbora" />
<meta property="og:type" content="website" />
<meta property="og:image" content="https://i.ibb.co/svkgZ96J/ico.jpg" />
<meta property="og:image:secure_url" content="https://i.ibb.co/svkgZ96J/ico.jpg" />
<meta property="og:description" content="Virtuálna prehliadka v Poráčskej doline" />
<meta property="og:url" content="https://lachivi.github.io/Stolna_Barbora/" />
<meta name="twitter:card" content="summary_large_image">

<title>Štôlna Barbora</title>

<style>
body {
    margin: 0;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

/* BACKGROUND IMAGE FULLSCREEN */
.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    background: url('https://i.ibb.co/svkgZ96J/ico.jpg') center/cover no-repeat;
    filter: blur(8px) brightness(0.6);
    transform: scale(1.1);
    animation: zoomIn 6s ease forwards, sharpen 3s ease forwards;
}

/* OVERLAY */
.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle, transparent 40%, rgba(0,0,0,0.7));
}

/* CONTENT */
.content {
    position: relative;
    z-index: 2;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    text-align: center;
    animation: fadeIn 2s ease;
}

h1 {
    font-size: 32px;
    letter-spacing: 2px;
    margin-bottom: 10px;
}

.subtitle {
    font-size: 14px;
    opacity: 0.7;
}

/* FADE OUT */
.fade-out {
    animation: fadeOut 1s ease forwards;
}

/* ANIMATIONS */
@keyframes zoomIn {
    from { transform: scale(1.1); }
    to { transform: scale(1.3); }
}

@keyframes sharpen {
    from { filter: blur(8px) brightness(0.6); }
    to { filter: blur(0px) brightness(1); }
}

@keyframes fadeIn {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
}

@keyframes fadeOut {
    to { opacity: 0; }
}
</style>

<script>
setTimeout(function() {
    document.body.classList.add("fade-out");

    setTimeout(function() {
        window.location.href = "https://lachivi.github.io/Stolna_Barbora/";
    }, 1000);

}, 3500);
</script>

</head>

<body>

<div class="bg"></div>
<div class="overlay"></div>

<div class="content">
    <h1>Banská štôlňa Barbora</h1>
    <div class="subtitle">Virtuálna prehliadka</div>
</div>

</body>
</html>
