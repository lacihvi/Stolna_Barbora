<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="utf-8">
    <!-- Tento riadok opraví zobrazovanie na mobiloch -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Virtuálna prehliadka</title>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background: black;
            font-family: Arial, sans-serif;
            overflow: hidden;
        }

        /* POZADIE - Zobrazí celý obrázok */
        .bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('https://lacihvi.github.io') center center no-repeat;
            background-size: contain; /* Zobrazí vždy CELÝ obrázok */
        }

        /* OBSAH - Tlačidlo */
        .content {
            position: absolute;
            left: 0;
            right: 0;
            bottom: 15%; /* Pozícia v percentách funguje najlepšie na všetkých displejoch */
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 10;
        }

        /* DIZAJN TLAČIDLA */
        .button {
            padding: 16px 32px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background: rgba(255, 255, 255, 0.15);
            border: 2px solid white;
            border-radius: 50px;
            cursor: pointer;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        .button:hover {
            background: white;
            color: black;
        }

        .note {
            color: white;
            margin-top: 12px;
            font-size: 12px;
            text-shadow: 1px 1px 2px black;
            opacity: 0.8;
        }

        /* ANIMÁCIA MIZNUTIA */
        .fade-out { animation: fadeOut 0.8s forwards; }
        @keyframes fadeOut { to { opacity: 0; } }
    </style>

    <script>
        function enterTour() {
            document.body.classList.add("fade-out");
            setTimeout(function() {
                window.location.href = "https://lacihvi.42web.io";
            }, 800);
        }
        setTimeout(enterTour, 5000);
    </script>
</head>
<body>
    <div class="bg"></div>
    <div class="content">
        <button class="button" onclick="enterTour()">Vstúpiť do prehliadky</button>
        <div class="note">automatické otvorenie o pár sekúnd…</div>
    </div>
</body>
</html>
