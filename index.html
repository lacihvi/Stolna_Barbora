
<!DOCTYPE html>
<html lang="sk">
<head>
<meta charset="utf-8">
<!-- PRIDANÉ: Toto povie mobilu, ako má zobraziť stránku -->
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<meta property="og:title" content="Virtuálna prehliadka" />
<meta property="og:type" content="website" />
<meta property="og:image" content="https://lacihvi.github.io/Stolna_Barbora/ico.png" />
<meta property="og:image:width" content="1200" />
<meta property="og:image:height" content="630" />
<meta property="og:description" content="Kliknite a vstúpte do virtuálnej prehliadky" />
<meta property="og:url" content="https://lacihvi.github.io/Stolna_Barbora/" />

<title>Virtuálna prehliadka</title>

<style>
body, html {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    font-family: Arial, sans-serif;
    background: black;
    color: white;
}

.bg {
    position: absolute;
    width: 100%;
    height: 100%;
    /* ZMENA: cover namiesto contain vyplní celú obrazovku */
    background: url('https://lacihvi.github.io/Stolna_Barbora/intro.png') center/cover no-repeat;
}

.overlay {
    position: absolute;
    width: 100%;
    height: 100%;
    background: rgba(0,0,0,0.4);
}

.content {
    position: absolute;
    z-index: 10;
    width: 100%;
    /* ZMENA: 100px posunie tlačidlo viditeľne vyššie aj na Chrome/FB */
    bottom: 100px;
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
}

.button {
    padding: 18px 40px;
    font-size: 16px;
    font-weight: bold;
    text-transform: uppercase;
    letter-spacing: 2px;
    border: 2px solid white;
    border-radius: 50px;
    background: rgba(255, 255, 255, 0.2);
    color: white;
    cursor: pointer;
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px); /* Pre Safari/iOS */
    transition: all 0.3s ease;
    box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.button:active { transform: scale(0.95); }

.note {
    margin-top: 15px;
    font-size: 12px;
    opacity: 0.8;
}

.fade-out { animation: fadeOut 0.8s ease forwards; }
@keyframes fadeOut { to { opacity: 0; } }
</style>

<script>
function enterTour() {
    document.body.classList.add("fade-out");
    setTimeout(function() {
        // Používame replace, aby sa ne dalo vrátiť späť na intro
        window.location.replace("https://lacihvi.42web.io/Pano/Barbora/tour.html");
    }, 800);
}
setTimeout(enterTour, 5000);
</script>
</head>
<body>
    <div class="bg"></div>
    <div class="overlay"></div>
    <div class="content">
        <button class="button" onclick="enterTour()">Vstúpiť do prehliadky</button>
        <div class="note">automatické otvorenie o chvíľu…</div>
    </div>
</body>
</html>
